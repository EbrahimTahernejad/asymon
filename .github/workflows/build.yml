name: build

on:
  push:
    branches: ["**"]
    tags:     ["v*"]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — primary targets (raw socket spoofing only works on Linux/root)
          - { goos: linux,   goarch: amd64  }
          - { goos: linux,   goarch: arm64  }
          - { goos: linux,   goarch: 386    }
          - { goos: linux,   goarch: arm, goarm: "7" }
          # Secondary targets (no spoofing, but normal forward path works)
          - { goos: darwin,  goarch: amd64  }
          - { goos: darwin,  goarch: arm64  }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build server
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM:  ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w" \
            -o dist/server-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            ./cmd/server

      - name: build client
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM:  ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w" \
            -o dist/client-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            ./cmd/client

      - name: vet
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go vet ./...

      - uses: actions/upload-artifact@v4
        with:
          name: asymon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  # On version tags: create a GitHub Release and attach all binaries
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
